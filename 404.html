<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable, Banchage terre-chanvre</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
  :root { --bg:#f5f7f3; --ink:#1c241c; --soft:#4a544a; --sage:#5e7a4f; --sage-deep:#3f5736; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { min-height:100vh; display:grid; place-items:center; padding:24px;
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif; background:var(--bg); color:var(--ink); text-align:center; }
  .box { max-width:30rem; }
  .code { font-size:clamp(3rem,10vw,5rem); font-weight:800; letter-spacing:-0.04em; color:var(--sage); line-height:1; }
  h1 { font-size:1.4rem; margin:14px 0 10px; }
  p { color:var(--soft); margin-bottom:24px; }
  a.btn { display:inline-block; padding:12px 22px; border-radius:999px; background:var(--sage); color:#fff;
    text-decoration:none; font-weight:700; transition:background 180ms ease; }
  a.btn:hover { background:var(--sage-deep); }
</style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Cette page n'existe pas</h1>
    <p>Le lien est peut-être incomplet ou la page a changé d'adresse.</p>
    <a class="btn" href="/">Revenir à l'accueil</a>
  </div>
</body>
</html>
